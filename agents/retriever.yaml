type: retriever
name: RetrieverAgent
description: >
  Fetches relevant documents from a knowledge base (vector store,
  Elastic, Weaviate, etc.) given a user query or a sub‑task from the plan.
class: agents.retriever.RetrieverAgent

vector_store:
  provider: pinecone
  index_name: knowledge-base
  environment: us-west1-gcp
  api_key: "<PINECONE_API_KEY>"

search:
  top_k: 8
  similarity_metric: cosine
  include_metadata: true

summarise:
  enabled: true
  model:
    provider: openai
    name: gpt-4o-mini
    temperature: 0.0
    max_tokens: 400
