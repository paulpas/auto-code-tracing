type: toolset
name: DefaultToolset
description: >
  A collection of low-level tools that any agent may call.
class: agents.toolset.DefaultToolset

tools:
  - name: llm
    class: "software_builder.tools.llm_tool.LLMTool"
    config:
      provider: openai
      model: gpt-4o-mini
      temperature: 0.7
  - name: web_search
    class: "software_builder.tools.search_tool.WebSearchTool"
    config:
      api_key: "<SERPAPI_KEY>"
      engine: "google"
  - name: wikipedia
    class: "software_builder.tools.wikipedia_tool.WikipediaTool"
    config: {}
  - name: calculator
    class: "software_builder.tools.calc_tool.CalculatorTool"
    config: {}
